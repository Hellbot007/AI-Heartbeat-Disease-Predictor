<!DOCTYPE html>
<html>

<head>
    <title>AI Heartbeat Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<h1>AI Heartbeat Disease Predictor</h1>

<p>Enter your heart rate (BPM) for instant analysis</p>

<div class="input-group">
    <input type="number" id="bpm" placeholder="Enter BPM" min="40" max="200">
    <button onclick="analyzeHeartbeat()">Analyze Heartbeat</button>
</div>

<div class="result" id="result-section" style="display: none;">

<h2>Analysis Result</h2>

<div class="result-item">
    <strong>Condition:</strong> <span id="condition"></span>
</div>
<div class="result-item">
    <strong>Severity:</strong> <span id="severity"></span>
</div>
<div class="result-item">
    <strong>AI Explanation:</strong> <span id="explanation"></span>
</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
