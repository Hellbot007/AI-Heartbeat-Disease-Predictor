<!DOCTYPE html>

<head>
    <title>AI Heartbeat Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>AI Heartbeat Disease Predictor</h1>

</div>

</div>
